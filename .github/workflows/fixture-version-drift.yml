name: fixture-version-drift

on:
  push:
    branches: [main]
  pull_request:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Fetch upstream roster
        run: |
          curl -fsSL https://raw.githubusercontent.com/Rynaro/eidolons/main/roster/index.yaml \
            -o /tmp/roster.yaml

      - name: Compute latest version set
        run: |
          yq eval '.eidolons[].versions.latest' /tmp/roster.yaml | sort -u > /tmp/latest-versions.txt
          echo "Latest versions in roster:"
          cat /tmp/latest-versions.txt

      - name: Check fixture versions
        run: |
          set -euo pipefail
          grep -rEn '"version":[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' examples/ \
            > /tmp/fixture-matches.txt || true
          fail=0
          while IFS= read -r match; do
            file=$(echo "$match" | cut -d: -f1)
            ver=$(echo "$match" | sed -E 's/.*"version":[[:space:]]*"([^"]+)".*/\1/')
            if ! grep -Fxq "$ver" /tmp/latest-versions.txt; then
              echo "::error file=$file::version $ver not found in roster versions.latest"
              fail=1
            fi
          done < /tmp/fixture-matches.txt
          if [ "$fail" = "1" ]; then
            echo "drift check failed: one or more fixture versions are not in the upstream roster"
            exit 1
          fi
          echo "drift check passed: all fixture versions are in the upstream roster"
