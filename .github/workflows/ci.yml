name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: check (containerized)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        run: docker compose build dev

      - name: make check
        run: make check

  contracts-drift:
    name: contracts drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        run: docker compose build dev

      - name: Sync contracts from upstream pin
        run: make sync-contracts

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- internal/contracts/; then
            echo "internal/contracts/ is out of sync with internal/contracts/.eclref. Run \`make sync-contracts\` and commit the result."
            exit 1
          fi

  build:
    name: build release binary
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release image
        run: make image
