name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: check (containerized)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache the dev-image layers via GitHub Actions cache. dev-image
      # rebuilds are the single longest step in this job (~30 s cold);
      # gha cache makes the second-and-later builds < 5 s.
      - name: Build dev image (with gha cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          tags: junction-dev:local
          load: true
          cache-from: type=gha,scope=dev
          cache-to:   type=gha,scope=dev,mode=max

      # Cache Go's build cache + module cache across runs. These are the
      # host paths that docker-compose.yml bind-mounts into the container.
      # The keys mirror go.sum so any module change invalidates them.
      - name: Cache Go build + module caches
        uses: actions/cache@v4
        with:
          path: |
            .gocache
            .gomodcache
          key:          ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-go-

      - name: make check
        run: make check

  contracts-drift:
    name: contracts drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image (with gha cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          tags: junction-dev:local
          load: true
          cache-from: type=gha,scope=dev
          cache-to:   type=gha,scope=dev,mode=max

      - name: Sync contracts from upstream pin
        run: make sync-contracts

      - name: Fail on drift
        run: |
          # Exclude VERSION because make sync-contracts re-stamps it with
          # today's date, which deterministically breaks any PR opened on a
          # day after the last sync commit (the .eclref pin is unchanged).
          if ! git diff --exit-code -- internal/contracts/ ':!internal/contracts/VERSION'; then
            echo "internal/contracts/ is out of sync with internal/contracts/.eclref. Run \`make sync-contracts\` and commit the result."
            exit 1
          fi

  build:
    name: build release binary
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Release image uses its own scope so a dev-image change doesn't
      # invalidate release cache and vice versa.
      - name: Build release image (with gha cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: release
          tags: junction:local
          build-args: |
            VERSION=0.0.0-dev
          cache-from: type=gha,scope=release
          cache-to:   type=gha,scope=release,mode=max
