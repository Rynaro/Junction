# trance-chain — three-stub ATLAS→SPECTRA→APIVR-Δ example.
#
# Each service reads its input envelope from its own in/ bind-mount and writes
# a canned output envelope to its out/ bind-mount. Sequential ordering is
# enforced by depends_on: condition: service_completed_successfully.
#
# Environment variables set by run.sh:
#   JUNCTION_THREAD_ID      — shared thread identifier
#   ATLAS_IN_DIR / ATLAS_OUT_DIR
#   SPECTRA_IN_DIR / SPECTRA_OUT_DIR
#   APIVR_IN_DIR / APIVR_OUT_DIR

services:
  stub-atlas:
    image: alpine:3.20
    read_only: true
    network_mode: none
    tmpfs:
      - /tmp
    volumes:
      - type: bind
        source: ${ATLAS_IN_DIR:?ATLAS_IN_DIR not set}
        target: /junction/io/in
        read_only: true
      - type: bind
        source: ${ATLAS_OUT_DIR:?ATLAS_OUT_DIR not set}
        target: /junction/io/out
    environment:
      JUNCTION_THREAD_ID: ${JUNCTION_THREAD_ID:-trance-thread-001}
      ECL_OUTPUT_DIR: /junction/io/out
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "[stub-atlas] emitting scout-report envelope …"
        THREAD_ID="$JUNCTION_THREAD_ID"
        OUT="$ECL_OUTPUT_DIR/scout-report.md.envelope.json"
        printf '{"envelope_version":"2.0","message_id":"01905e80-c0b0-7000-8000-000000000002","thread_id":"%s","parent_id":"01905e80-c0a0-7000-8000-000000000001","from":{"eidolon":"atlas","version":"1.5.2"},"to":{"eidolon":"spectra","version":"4.3.2"},"performative":"PROPOSE","edge_origin":"roster","objective":"Hand scout-report to SPECTRA.","artifact":{"kind":"scout-report","schema_version":"1.0","path":"scout-report.md","sha256":"e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855","size_bytes":0},"context_delta":{"token_budget":4000,"tokens_used":80,"input_handles":[],"summary":"Stub scout-report."},"constraints":{"trust_level":"standard"},"confidence":1.0,"integrity":{"method":"sha256","value":"e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"},"trace":{"ts":"2026-05-13T00:00:00Z","host":"junction-example","model":"stub","tier":"trance"}}' \
          "$THREAD_ID" > "$OUT"
        echo "[stub-atlas] wrote $OUT"

  stub-spectra:
    image: alpine:3.20
    read_only: true
    network_mode: none
    tmpfs:
      - /tmp
    depends_on:
      stub-atlas:
        condition: service_completed_successfully
    volumes:
      - type: bind
        source: ${SPECTRA_IN_DIR:?SPECTRA_IN_DIR not set}
        target: /junction/io/in
        read_only: true
      - type: bind
        source: ${SPECTRA_OUT_DIR:?SPECTRA_OUT_DIR not set}
        target: /junction/io/out
    environment:
      JUNCTION_THREAD_ID: ${JUNCTION_THREAD_ID:-trance-thread-001}
      ECL_OUTPUT_DIR: /junction/io/out
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "[stub-spectra] emitting spec envelope …"
        THREAD_ID="$JUNCTION_THREAD_ID"
        OUT="$ECL_OUTPUT_DIR/spec.md.envelope.json"
        printf '{"envelope_version":"2.0","message_id":"01905e80-c0c0-7000-8000-000000000003","thread_id":"%s","parent_id":"01905e80-c0b0-7000-8000-000000000002","from":{"eidolon":"spectra","version":"4.3.2"},"to":{"eidolon":"apivr","version":"3.1.2"},"performative":"PROPOSE","edge_origin":"roster","objective":"Hand spec to APIVR-delta.","artifact":{"kind":"spec","schema_version":"1.0","path":"spec.md","sha256":"e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855","size_bytes":0},"context_delta":{"token_budget":4000,"tokens_used":150,"input_handles":[],"summary":"Stub spec."},"constraints":{"trust_level":"standard"},"confidence":1.0,"integrity":{"method":"sha256","value":"e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"},"trace":{"ts":"2026-05-13T00:00:00Z","host":"junction-example","model":"stub","tier":"trance"}}' \
          "$THREAD_ID" > "$OUT"
        echo "[stub-spectra] wrote $OUT"

  stub-apivr:
    image: alpine:3.20
    read_only: true
    network_mode: none
    tmpfs:
      - /tmp
    depends_on:
      stub-spectra:
        condition: service_completed_successfully
    volumes:
      - type: bind
        source: ${APIVR_IN_DIR:?APIVR_IN_DIR not set}
        target: /junction/io/in
        read_only: true
      - type: bind
        source: ${APIVR_OUT_DIR:?APIVR_OUT_DIR not set}
        target: /junction/io/out
    environment:
      JUNCTION_THREAD_ID: ${JUNCTION_THREAD_ID:-trance-thread-001}
      ECL_OUTPUT_DIR: /junction/io/out
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "[stub-apivr] emitting completion envelope …"
        THREAD_ID="$JUNCTION_THREAD_ID"
        OUT="$ECL_OUTPUT_DIR/completion.md.envelope.json"
        printf '{"envelope_version":"2.0","message_id":"01905e80-c0d0-7000-8000-000000000004","thread_id":"%s","parent_id":"01905e80-c0c0-7000-8000-000000000003","from":{"eidolon":"apivr","version":"3.1.2"},"to":{"eidolon":"idg","version":"1.1.5"},"performative":"PROPOSE","edge_origin":"roster","objective":"Implementation complete; hand to IDG for chronicling.","artifact":{"kind":"completion-report","schema_version":"1.0","path":"completion.md","sha256":"e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855","size_bytes":0},"context_delta":{"token_budget":4000,"tokens_used":200,"input_handles":[],"summary":"Stub completion report."},"constraints":{"trust_level":"standard"},"confidence":1.0,"integrity":{"method":"sha256","value":"e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"},"trace":{"ts":"2026-05-13T00:00:00Z","host":"junction-example","model":"stub","tier":"trance"}}' \
          "$THREAD_ID" > "$OUT"
        echo "[stub-apivr] wrote $OUT"
