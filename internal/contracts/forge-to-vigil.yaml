contract_version: "1.0"
from: forge
to: vigil
edge_origin: roster
performatives_allowed:
  - PROPOSE
  - INFORM
  - CRITIQUE
artifacts:
  - kind: reasoning-report
    schema_ref: ../schemas/per-eidolon/reasoning-report.v1.json
    required_sections:
      - decision
      - hypotheses_summary
      - reversal_conditions
      - alternatives_considered
    evidence_anchor_required: false
context_delta:
  token_budget_max: 3000
  required_handles: []
trust_level: standard
notes: >
  FORGE returns a reasoning report to VIGIL in response to vigil→forge
  consultation. Listed in roster: forge.handoffs.lateral contains vigil.
  CRITIQUE is reserved for the REFORGE case where FORGE refuses the
  blame-target frame — typically when reproduction evidence is too thin
  for any of VIGIL's hypotheses to be reasoned about, and an extra
  observation pass is the right next step.
