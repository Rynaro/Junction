contract_version: "1.0"
from: forge
to: atlas
edge_origin: roster
performatives_allowed:
  - PROPOSE
  - INFORM
  - CRITIQUE
artifacts:
  - kind: reasoning-report
    schema_ref: ../schemas/per-eidolon/reasoning-report.v1.json
    required_sections:
      - decision
      - hypotheses_summary
      - reversal_conditions
      - alternatives_considered
    evidence_anchor_required: false
context_delta:
  token_budget_max: 3000
  required_handles: []
trust_level: standard
notes: >
  FORGE returns a reasoning report to ATLAS in response to atlas→forge
  consultation. Listed in roster: forge.handoffs.lateral contains atlas.
  CRITIQUE is reserved for the REFORGE case where FORGE reframes the
  question rather than answering it (e.g. when the structural choice
  ATLAS surfaced cannot be decided without a missing hand-off target).
