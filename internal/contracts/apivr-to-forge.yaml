contract_version: "1.0"
from: apivr
to: forge
edge_origin: roster
performatives_allowed:
  - REQUEST
  - CRITIQUE
artifacts:
  - kind: reasoning-request
    schema_ref: ../schemas/per-eidolon/_base-profile.v1.json
    required_sections:
      - question
      - context
      - constraints
      - candidate_answers
    evidence_anchor_required: false
context_delta:
  token_budget_max: 3000
  required_handles: []
trust_level: standard
notes: >
  APIVR-Δ consults FORGE during Plan phase when ambiguity or trade-offs
  surface. Listed in roster: apivr.handoffs.lateral contains forge. The
  reasoning-request profile is intentionally lightweight (base profile
  only); FORGE methodology owns the body shape. This contract is the
  representative shape for all consultation requests to FORGE; per-edge
  contracts for atlas→forge, spectra→forge, idg→forge, vigil→forge follow
  the same template and are added per-PR as those edges are exercised.
