contract_version: "1.0"
from: human
to: forge
edge_origin: roster
performatives_allowed:
  - REQUEST
  - INFORM
  - CRITIQUE
  - REFUSE
  - ACKNOWLEDGE
  - ESCALATE
artifacts:
  - kind: prompt
    schema_ref: ../schemas/per-eidolon/_base-profile.v1.json
    evidence_anchor_required: false
context_delta:
  token_budget_max: 4000
  required_handles: []
trust_level: standard
notes: >
  Human-origin edge into FORGE. The originator may REQUEST FORGE to
  perform a quality gate, RFC review, or arbitrate a trade-off, INFORM
  it with additional context (a counterfactual, an external constraint
  not surfaced in the originating chain), CRITIQUE a prior reasoning
  report, REFUSE a proposed decision (FORGE re-runs with the human's
  REFUSE recorded in the trace), ACKNOWLEDGE a reasoning report, or
  ESCALATE a blocker. Note that FORGE is itself the evaluator role
  emitting DECIDE — the human's role here is to feed inputs and accept
  or reject outputs, never to short-circuit FORGE's own DECIDE. Human
  originators MUST NOT emit PROPOSE, DECIDE, DELEGATE, or RESUME — see
  human-to-atlas.yaml for per-performative rationale (Junction spec
  §5.7). Authored to support Junction's F-HUMAN-EDGE; additive to ECL
  v1.0 with no spec-version bump.
