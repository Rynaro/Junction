contract_version: "1.0"
from: spectra
to: forge
edge_origin: roster
performatives_allowed:
  - REQUEST
  - CRITIQUE
artifacts:
  - kind: reasoning-request
    schema_ref: ../schemas/per-eidolon/_base-profile.v1.json
    required_sections:
      - question
      - context
      - constraints
      - candidate_answers
    evidence_anchor_required: false
context_delta:
  token_budget_max: 3000
  required_handles: []
trust_level: standard
notes: >
  SPECTRA consults FORGE during the Explore or Construct phase when the
  scoring rubric for two candidate strategies converges within the
  decision-band noise floor, or when a stakeholder constraint forces a
  trade-off that the rubric cannot disambiguate. Listed in roster:
  spectra.handoffs.lateral contains forge. Same lightweight body shape
  as apivr-to-forge; FORGE owns the response.
