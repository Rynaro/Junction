contract_version: "1.0"
from: human
to: vigil
edge_origin: roster
performatives_allowed:
  - REQUEST
  - INFORM
  - CRITIQUE
  - REFUSE
  - ACKNOWLEDGE
  - ESCALATE
artifacts:
  - kind: prompt
    schema_ref: ../schemas/per-eidolon/_base-profile.v1.json
    evidence_anchor_required: false
context_delta:
  token_budget_max: 4000
  required_handles: []
trust_level: standard
notes: >
  Human-origin edge into VIGIL. The originator may REQUEST VIGIL to
  investigate or patch a defect, INFORM it with additional context (a
  reproducer, a suspect commit, a log excerpt), CRITIQUE a prior
  root-cause report for revision, REFUSE a proposed patch, ACKNOWLEDGE
  a patch or root-cause report to close a pause-on gate, or ESCALATE a
  blocker outside the current chain. Human originators MUST NOT emit
  PROPOSE, DECIDE, DELEGATE, or RESUME — see human-to-atlas.yaml for
  per-performative rationale (Junction spec §5.7). Authored to support
  Junction's F-HUMAN-EDGE; additive to ECL v1.0 with no spec-version
  bump.
