contract_version: "1.0"
from: human
to: vigil
edge_origin: roster
performatives_allowed:
  - REQUEST
  - INFORM
  - CRITIQUE
  - REFUSE
  - ACKNOWLEDGE
  - ESCALATE
artifacts:
  - kind: prompt
    schema_ref: ../schemas/per-eidolon/prompt.v1.json
trust_level: standard
notes: >
  A human originator may REQUEST vigil to investigate or patch a defect,
  INFORM it with additional context, CRITIQUE a prior root-cause report,
  REFUSE a proposed patch, ACKNOWLEDGE a proposed artefact, or ESCALATE a
  blocker.
  Human originators MUST NOT emit PROPOSE, DECIDE, DELEGATE, or RESUME
  (spec §5.7, F-HUMAN-EDGE).
