contract_version: "1.0"
from: vivi
to: forge
edge_origin: roster
performatives_allowed:
  - REQUEST
  - CRITIQUE
artifacts:
  - kind: reasoning-request
    schema_ref: ../schemas/per-eidolon/_base-profile.v1.json
    required_sections:
      - question
      - context
      - constraints
      - candidate_answers
    evidence_anchor_required: false
context_delta:
  token_budget_max: 3000
  required_handles: []
trust_level: standard
notes: >
  Vivi consults FORGE during the Plan phase (P) when ambiguity or
  trade-offs surface. Listed in roster: vivi.handoffs.lateral contains
  forge. The reasoning-request profile is intentionally lightweight (base
  profile only); FORGE methodology owns the body shape. Emitted from
  templates/reasoning-request.envelope.json. Mirrors apivr-to-forge.yaml
  — Vivi succeeds APIVR-Δ as the default coder seat.
