contract_version: "1.0"
from: vigil
to: forge
edge_origin: roster
performatives_allowed:
  - REQUEST
  - CRITIQUE
artifacts:
  - kind: reasoning-request
    schema_ref: ../schemas/per-eidolon/_base-profile.v1.json
    required_sections:
      - question
      - context
      - constraints
      - candidate_answers
    evidence_anchor_required: false
context_delta:
  token_budget_max: 3000
  required_handles: []
trust_level: standard
notes: >
  VIGIL consults FORGE during the Graph or Intervene phase when the
  dependency-graph ranking surfaces ≥2 hypotheses with comparable
  counterfactual support, or when the ≤5-intervention budget approaches
  exhaustion without a single blame-target emerging. Listed in roster:
  vigil.handoffs.lateral contains forge. Same body shape as
  apivr-to-forge; FORGE owns the response.
