contract_version: "1.0"
from: idg
to: forge
edge_origin: roster
performatives_allowed:
  - REQUEST
  - CRITIQUE
artifacts:
  - kind: reasoning-request
    schema_ref: ../schemas/per-eidolon/_base-profile.v1.json
    required_sections:
      - question
      - context
      - constraints
      - candidate_answers
    evidence_anchor_required: false
context_delta:
  token_budget_max: 3000
  required_handles: []
trust_level: standard
notes: >
  IDG consults FORGE when a chronicle must adjudicate between conflicting
  source artefacts — e.g. two upstream Eidolons recorded contradictory
  decisions for the same change, or a `[DISPUTED]` marker requires
  reasoned resolution before it can be retired. Listed in roster:
  idg.handoffs.lateral contains forge. Mirrors apivr-to-forge; FORGE
  owns the response body.
