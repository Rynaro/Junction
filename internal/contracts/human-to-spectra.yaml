contract_version: "1.0"
from: human
to: spectra
edge_origin: roster
performatives_allowed:
  - REQUEST
  - INFORM
  - CRITIQUE
  - REFUSE
  - ACKNOWLEDGE
  - ESCALATE
artifacts:
  - kind: prompt
    schema_ref: ../schemas/per-eidolon/_base-profile.v1.json
    evidence_anchor_required: false
context_delta:
  token_budget_max: 4000
  required_handles: []
trust_level: standard
notes: >
  Human-origin edge into SPECTRA. The originator may REQUEST SPECTRA to
  author a decision-ready specification, INFORM it with additional
  context (a reference doc, an updated requirement, a fact discovered
  mid-cycle), CRITIQUE a prior spec for revision (tightening a gate,
  reframing a story), REFUSE a proposed spec, ACKNOWLEDGE a spec to
  close a pause-on gate before APIVR-Δ proceeds, or ESCALATE a blocker
  outside the current chain (e.g. "this needs ATLAS first"). Human
  originators MUST NOT emit PROPOSE, DECIDE, DELEGATE, or RESUME — see
  human-to-atlas.yaml for per-performative rationale (Junction spec
  §5.7). Authored to support Junction's F-HUMAN-EDGE; additive to ECL
  v1.0 with no spec-version bump.
