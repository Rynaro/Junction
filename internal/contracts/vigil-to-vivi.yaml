contract_version: "1.0"
from: vigil
to: vivi
edge_origin: roster
performatives_allowed:
  - PROPOSE
  - CRITIQUE
  - INFORM
artifacts:
  - kind: root-cause-report
    schema_ref: ../schemas/per-eidolon/root-cause-report.v1.json
    required_sections:
      - reproduction
      - hypotheses
      - interventions
      - blame_target
    evidence_anchor_required: true
context_delta:
  token_budget_max: 4000
  required_handles: []
trust_level: high
notes: >
  VIGIL returns a root-cause attribution (and, when authority allows, a
  verified patch) to the Vivi instance that escalated. Listed in roster:
  vivi.handoffs.lateral contains vigil. CRITIQUE is reserved for the case
  where VIGIL disputes Vivi's repair hypothesis without yet supplying a
  verified alternative. Vivi's bounded recovery gate (I-5) escalates on
  the 3-failure threshold for the same failure category via a
  repair-failed-report envelope (see vivi-to-vigil.yaml). This edge
  mirrors vigil-to-apivr.yaml — Vivi succeeds APIVR-Δ as the default
  coder seat. Inbound fixture at
  templates/inbound/root-cause-report.envelope.fixture.json.
