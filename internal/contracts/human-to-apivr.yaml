contract_version: "1.0"
from: human
to: apivr
edge_origin: roster
performatives_allowed:
  - REQUEST
  - INFORM
  - CRITIQUE
  - REFUSE
  - ACKNOWLEDGE
  - ESCALATE
artifacts:
  - kind: prompt
    schema_ref: ../schemas/per-eidolon/_base-profile.v1.json
    evidence_anchor_required: false
context_delta:
  token_budget_max: 4000
  required_handles: []
trust_level: standard
notes: >
  Human-origin edge into APIVR-Δ. The originator may REQUEST APIVR-Δ to
  implement a feature or run the A→P→I→V→Δ cycle on a spec, INFORM it
  with additional context (a test case to anchor against, a constraint
  surfaced after planning), CRITIQUE a prior implementation report or a
  proposed plan during the Plan phase, REFUSE a proposed artefact,
  ACKNOWLEDGE a completion report to close a pause-on gate, or ESCALATE
  a blocker (e.g. "this should route to VIGIL"). Human originators MUST
  NOT emit PROPOSE, DECIDE, DELEGATE, or RESUME — see human-to-atlas.yaml
  for per-performative rationale (Junction spec §5.7). Authored to
  support Junction's F-HUMAN-EDGE; additive to ECL v1.0 with no
  spec-version bump.
